<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Evaluation AI - Teacher Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="frontpage.css">
<link rel="stylesheet" href="front.css">
</head>

<body>

<!-- LEFT -->
<div class="left">
  <i class="fas fa-chalkboard-teacher edu-left l1"></i>
  <i class="fas fa-book-reader edu-left l2"></i>
  <i class="fas fa-pencil-alt edu-left l3"></i>

  <img src="frontpage.png" class="logo">

  <h1 class="title">TEACHER PORTAL</h1>
  <p class="subtitle">
    Manage assessments, evaluate students, and track academic progress
  </p>
</div>

<!-- RIGHT -->
<div class="right">
  <a href="frontpage.html" class="back-btn" title="Back to home">
    <i class="fas fa-arrow-left"></i>
  </a>

  <i class="fas fa-graduation-cap edu-right r1"></i>
  <i class="fas fa-book edu-right r2"></i>
  <i class="fas fa-pen edu-right r3"></i>

  <div class="login-box">
    <div style="text-align:center; margin-bottom:25px;">
      <i class="fas fa-chalkboard-user" style="font-size:3rem; color:#5a0f1b;"></i>
    </div>
    <div class="login-title">Teacher Login</div>

    <input id="login-username"
       type="text"
       placeholder="👨‍🏫 Teacher ID"
       pattern="[a-z0-9]+"
       title="Only lowercase letters and numbers allowed"
       required>
    <input id="login-password" type="password" placeholder="🔒 Password" required>

    <button class="btn" onclick="login();">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
    
    <div style="margin-top:20px; padding-top:20px; border-top:1px solid #ddd; text-align:center;">
      <p style="color:#777; font-size:14px; margin-bottom:10px;">
        Don't have an account? <a href="javascript:void(0)" onclick="openPopup()" style="color:#5a0f1b; font-weight:600; text-decoration:none;">Sign up here</a>
      </p>
      <p style="color:#999; font-size:12px;">
        <i class="fas fa-lock"></i> Secure login
      </p>
    </div>
  </div>
</div>

<!-- REGISTRATION POPUP -->
<div class="modal" id="popup">
    <div class="register-box" style="width:520px; position:relative;">
        <span class="close-btn" onclick="closePopup()">×</span>

        <div class="register-title">Teacher Registration</div>

        <div class="form-grid">
            <input id="reg-fullname" type="text" placeholder="Full Name">
            <input id="reg-username"
       type="text"
       placeholder="Username only small letters&numbers
       pattern="[a-z0-9]+"
       title="Only small letters & numbers"
       required>

            <input id="reg-password" type="password" placeholder="Password">
            <input id="reg-department" type="text" placeholder="Department">

            <input id="reg-confirm-password" type="password" placeholder="Confirm Password">
            <input id="reg-mobile" type="tel" placeholder="Mobile Number">

            

            <button type="button" style="grid-column:1/3;" onclick="registerTeacher()">
                Register
            </button>
        </div>
    </div>
</div>

<!-- JS for popup and login -->
<script>
function openPopup(){
  document.getElementById("popup").classList.add("show");
  const firstInput = document.querySelector('#popup input');
  if(firstInput) firstInput.focus();
}

function closePopup(){
  const popup = document.getElementById("popup");
  popup.classList.remove("show");
  try{ document.activeElement && document.activeElement.blur(); }catch(e){}
  const guard = document.createElement('div');
  guard.setAttribute('tabindex','-1');
  guard.style.position='fixed'; guard.style.left='-9999px';
  document.body.appendChild(guard);
  guard.focus();
  setTimeout(()=>{ guard.parentNode && guard.parentNode.removeChild(guard); }, 50);
}

async function registerTeacher(){
  const name = document.getElementById('reg-fullname').value.trim();
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm-password').value;
  const department = document.getElementById('reg-department').value.trim();
  const phone = document.getElementById('reg-mobile').value.trim();
  const email = document.getElementById('reg-email').value.trim();

  if(password !== confirm){
    alert('Passwords do not match');
    return;
  }

  try {
    const res = await fetch('/api/teacher/register', {
      method: 'POST',
      credentials: 'same-origin',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name, username, password, department, phone, email
      })
    });
    const data = await res.json();
    if(!res.ok){
      alert(data.message || 'Registration failed');
      return;
    }
    alert('✓ Registration successful! You can now login with your credentials.');
    closePopup();
  } catch(err){
    alert('Error: ' + err);
  }
}

async function login(){
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  try{
    const res = await fetch('/api/teacher/login', {
      method:'POST',
      credentials: 'same-origin',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if(res.ok){
      window.location.href = 'teach.html';
    } else {
      alert(data.message || 'Login failed');
    }
  }catch(err){
    alert('Error: '+err);
  }
}
// Force lowercase & remove special characters while typing
function validateUsername(inputId){
  const input = document.getElementById(inputId);

  input.addEventListener('input', function(){
    const value = this.value;

    if(!/^[a-z0-9]*$/.test(value)){
      alert("Only small letters (a-z) and numbers (0-9) are allowed!");
      this.value = value.slice(0, -1); // remove last invalid character
    }
  });
}

validateUsername('login-username');
validateUsername('reg-username');

</script>

</body>
</html>
