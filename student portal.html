<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Evaluation AI - Student Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="frontpage.css">
<link rel="stylesheet" href="front.css">
</head>

<body>

<!-- LEFT -->
<div class="left">
  <i class="fas fa-user-graduate edu-left l1"></i>
  <i class="fas fa-book-reader edu-left l2"></i>
  <i class="fas fa-pencil-alt edu-left l3"></i>

  <img src="frontpage.png" class="logo">

  <h1 class="title">STUDENT PORTAL</h1>
  <p class="subtitle">
    Access assessments, view results, and track your academic progress
  </p>
</div>

<!-- RIGHT -->
<div class="right">
  <a href="frontpage.html" class="back-btn" title="Back to home">
    <i class="fas fa-arrow-left"></i>
  </a>

  <i class="fas fa-graduation-cap edu-right r1"></i>
  <i class="fas fa-book edu-right r2"></i>
  <i class="fas fa-pen edu-right r3"></i>

  <div class="login-box">
    <div style="text-align:center; margin-bottom:25px;">
      <i class="fas fa-student" style="font-size:3rem; color:#5a0f1b;"></i>
    </div>
    <div class="login-title">Student Login</div>

    <input id="login-username" type="text" placeholder="📚 Username" required>
    <input id="login-password" type="password" placeholder="🔒 Password" required>

    <button class="btn" onclick="login();">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
    
    <div style="margin-top:20px; padding-top:20px; border-top:1px solid #ddd; text-align:center;">
      <p style="color:#777; font-size:14px; margin-bottom:10px;">
        Don't have an account? <a href="javascript:void(0)" onclick="openPopup()"style="color:#5a0f1b; font-weight:600; text-decoration:none;">Sign up here</a>
      </p>
      <p style="color:#999; font-size:12px;">
        <i class="fas fa-lock"></i> Secure login
      </p>
    </div>
  </div>
</div>


<!-- REGISTRATION POPUP (from student dashboard) -->
<div class="modal" id="popup">
    <div class="register-box" style="width:520px; position:relative;">
        <span class="close-btn" onclick="closePopup()">×</span>

        <div class="register-title">Student Registration</div>

        <div style="text-align:center; margin-bottom:20px;">
            <div id="preview-avatar" style="width:100px; height:100px; border-radius:50%; background:#f0f0f0; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:40px; color:#ddd; border:3px solid #5a0f1b; overflow:hidden;">
                <i class="fas fa-user"></i>
            </div>
            <label style="color:#5a0f1b; font-weight:600; cursor:pointer; display:inline-block; padding:8px 15px; border:1px solid #5a0f1b; border-radius:8px;">
                Upload Profile Picture
                <input type="file" id="profile-pic-input" accept="image/*" style="display:none;">
            </label>
        </div>

        <div class="form-grid">
            <input id="reg-semester" type="text" placeholder="Semester">
            <input id="reg-fullname" type="text" placeholder="Full Name">

            <input id="reg-username" type="text" placeholder="Username (only small letters & numbers)">
            <input id="reg-roll" type="text" placeholder="College Roll Number">

            <input id="reg-password" type="password" placeholder="Password">
            <select id="reg-department">
              <option value="" selected disabled>Select Department</option>
              <option value="CSA">CSA</option>
              <option value="CSB">CSB</option>
              <option value="CYBER">CYBER</option>
              <option value="AIDS">AIDS</option>
              <option value="AI">AI</option>
              <option value="MECH">MECH</option>
              <option value="CIVIL">CIVIL</option>
              <option value="EEE">EEE</option>
              <option value="EC">EC</option>
            </select>

            <input id="reg-confirm-password" type="password" placeholder="Confirm Password">
            <input id="reg-mobile" type="tel" placeholder="Mobile Number">

            <input id="reg-email" type="email" placeholder="Email ID">

            <button type="button" style="grid-column:1/3;" onclick="registerStudent()">
                Register
            </button>
        </div>
    </div>
</div>


<!-- JS for popup -->
<script>
function openPopup(){
  document.getElementById("popup").classList.add("show");
  const firstInput = document.querySelector('#popup input');
  if(firstInput) firstInput.focus();
}

function closePopup(){
  const popup = document.getElementById("popup");
  popup.classList.remove("show");
  try{ document.activeElement && document.activeElement.blur(); }catch(e){}
  const guard = document.createElement('div');
  guard.setAttribute('tabindex','-1');
  guard.style.position='fixed'; guard.style.left='-9999px';
  document.body.appendChild(guard);
  guard.focus();
  setTimeout(()=>{ guard.parentNode && guard.parentNode.removeChild(guard); }, 50);
}

// Profile picture upload
document.addEventListener('DOMContentLoaded', function(){
  const profileInput = document.getElementById('profile-pic-input');
  const previewAvatar = document.getElementById('preview-avatar');
  
  if(profileInput && previewAvatar){
    profileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(file){
        const reader = new FileReader();
        reader.onload = (event) => {
          const imageData = event.target.result;
          localStorage.setItem('studentProfilePic', imageData);
          previewAvatar.style.backgroundImage = `url('${imageData}')`;
          previewAvatar.innerHTML = '';
          previewAvatar.style.backgroundSize = 'cover';
          previewAvatar.style.backgroundPosition = 'center';
        };
        reader.readAsDataURL(file);
      }
    });
  }
});
// Username validation (only small letters and numbers)



async function registerStudent(){
  const semester = document.getElementById('reg-semester').value.trim();
  const name = document.getElementById('reg-fullname').value.trim();
  const username = document.getElementById('reg-username').value.trim();
  const roll_number = document.getElementById('reg-roll').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm-password').value;
  const department = document.getElementById('reg-department').value.trim();
  const phone = document.getElementById('reg-mobile').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  // Email validation
const emailPattern = /^[a-zA-Z0-9._%+-]+@mgits\.ac\.in$/;

if(!emailPattern.test(email)){
  alert('Email must be a valid @mgits.ac.in address');
  return;
}

// Ensure only one @ symbol
if((email.match(/@/g) || []).length !== 1){
  alert('Email must contain only one @ symbol');
  return;
}

if(!department){
  alert('Please select a department');
  return;
}

  if(password !== confirm){
    alert('Passwords do not match');
    return;
  }

  const photo = localStorage.getItem('studentProfilePic') || '';

  try {
    const res = await fetch('/api/student/register', {
      method: 'POST',
      credentials: 'same-origin',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        semester,name,username,roll_number,password,department,phone,email,photo
      })
    });
    const data = await res.json();
    if(!res.ok){
      alert(data.message || 'Registration failed');
      return;
    }
    alert('✓ Registration successful! You can now login with your credentials.');
    closePopup();
  } catch(err){
    alert('Error: ' + err);
  }
}

async function login(){
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  try{
    const res = await fetch('/api/student/login', {
      method:'POST',
      credentials: 'same-origin',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, roll_number: username, password})
    });
    const data = await res.json();
    if(res.ok){
      window.location.href = 'student dashboard.html';
    } else {
      alert(data.message || 'Login failed');
    }
  }catch(err){
    alert('Error: '+err);
  }
}
// Username validation with popup warning
function validateUsername(inputId){
  const input = document.getElementById(inputId);

  if(input){
    input.addEventListener('input', function(){
      const value = this.value;

      if(!/^[a-z0-9]*$/.test(value)){
        alert("Only small letters (a-z) and numbers (0-9) are allowed!");
        this.value = value.slice(0, -1); // remove last invalid character
      }
    });
  }
}

// Apply to both register and login username
validateUsername('reg-username');
validateUsername('login-username');
</script>

</body>
</html>
